name: Publish NuGet

# On push to main that touches src/** (or manual dispatch), bump patch +0.0.1
# from the latest nuget.org version and publish Orion.RakNet.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (must be greater than latest on nuget.org)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository_owner == 'OrionBedrock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: ver
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version }}
          PACKAGE_ID: Orion.RakNet
          CSPROJ: src/Orion.RakNet/Orion.RakNet.csproj
        run: |
          set -euo pipefail

          version_gt() {
            [ "$(printf '%s\n%s\n' "$2" "$1" | sort -V | tail -1)" = "$1" ] && [ "$1" != "$2" ]
          }

          bump_patch() {
            local v="$1"
            local major minor patch
            IFS=. read -r major minor patch <<< "$v"
            patch=${patch%%-*}
            echo "${major}.${minor}.$((patch + 1))"
          }

          ID_LOWER=$(echo "$PACKAGE_ID" | tr '[:upper:]' '[:lower:]')
          CURRENT=""
          if INDEX=$(curl -fsSL "https://api.nuget.org/v3-flatcontainer/${ID_LOWER}/index.json" 2>/dev/null); then
            CURRENT=$(echo "$INDEX" | jq -r '.versions[-1] // empty')
          fi
          echo "Latest on nuget.org: ${CURRENT:-<none>}"

          if [ -n "${VERSION_OVERRIDE}" ]; then
            if [ -n "$CURRENT" ] && ! version_gt "$VERSION_OVERRIDE" "$CURRENT"; then
              echo "::error::Override '${VERSION_OVERRIDE}' must be greater than latest '${CURRENT}'"
              exit 1
            fi
            VER="$VERSION_OVERRIDE"
          elif [ -z "$CURRENT" ]; then
            VER=$(grep -oP '(?<=<Version>)[^<]+' "$CSPROJ" | head -1)
            echo "No nuget.org version; using csproj: $VER"
          else
            VER=$(bump_patch "$CURRENT")
            echo "Auto-bump patch: $CURRENT -> $VER"
          fi

          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $VER"

      - name: Pack
        run: |
          mkdir -p artifacts/nuget
          VER="${{ steps.ver.outputs.version }}"
          dotnet pack src/Orion.RakNet/Orion.RakNet.csproj \
            -c Release \
            -o artifacts/nuget \
            -p:Version="$VER" \
            -p:PackageVersion="$VER"
          ls -la artifacts/nuget/

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
